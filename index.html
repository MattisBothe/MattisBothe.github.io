<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter · Bremerhaven</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#060d1a;--accent:#4fc3f7;--accent2:#b39ddb;--text:#e8f4fd;--muted:#7a9ab5}
body{background:var(--sky);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;position:relative}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes twinkle{0%,100%{opacity:var(--mo,.8)}50%{opacity:.1}}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0;transition:opacity 1.5s}
canvas.show{opacity:1}
.page{position:relative;z-index:2;max-width:660px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
.city{font-size:clamp(2.2rem,8vw,4rem);font-weight:800;letter-spacing:-.03em;line-height:1}
.date{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);font-style:italic;margin-top:.4rem}
.hero{display:flex;align-items:flex-end;gap:2rem;margin:2.5rem 0 3rem;flex-wrap:wrap}
.temp-big{font-size:clamp(5rem,18vw,9rem);font-weight:800;line-height:1;letter-spacing:-.05em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:opacity .4s}
.temp-unit{font-size:2rem;color:var(--accent);font-weight:700;margin-bottom:1rem}
.cond{font-size:1.3rem;font-weight:700;margin-bottom:.3rem}
.sub{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:.2rem}
.tabs{display:flex;gap:.5rem;margin-bottom:2rem;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
.tab{flex:1;padding:.5rem;border:none;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border-radius:9px;transition:all .25s;text-transform:uppercase;letter-spacing:.05em}
.tab.active{background:rgba(79,195,247,.15);color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;margin-bottom:2rem}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(79,195,247,.1);border-radius:16px;padding:1.2rem 1.4rem;transition:border-color .3s}
.card:hover{border-color:rgba(79,195,247,.3)}
.card-label{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.card-value{font-size:1.6rem;font-weight:800}
.card-sub{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:.2rem}
.section-label{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem}
.hourly{display:flex;gap:.6rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:none}
.hourly::-webkit-scrollbar{display:none}
.hour{flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:.8rem .9rem;text-align:center;min-width:62px}
.hour.now{background:rgba(79,195,247,.12);border-color:rgba(79,195,247,.3)}
.hour-time{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);margin-bottom:.4rem}
.hour-icon{font-size:1.2rem;margin-bottom:.3rem}
.hour-temp{font-size:.82rem;font-weight:700}
.forecast{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem}
.frow{display:flex;align-items:center;gap:1rem;padding:.7rem 1rem;background:rgba(255,255,255,.03);border-radius:12px;border:1px solid rgba(255,255,255,.05);transition:background .2s}
.frow:hover{background:rgba(255,255,255,.07)}
.fday{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);width:34px;flex-shrink:0}
.ficon{font-size:1.15rem;flex-shrink:0}
.fbar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.fbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.ftemps{font-family:'Space Mono',monospace;font-size:.7rem;flex-shrink:0}
.flo{color:var(--muted);margin-left:.3rem}
.moon-bar{display:flex;align-items:center;gap:1.2rem;margin-top:2rem;padding:1.2rem 1.4rem;background:rgba(179,157,219,.07);border:1px solid rgba(179,157,219,.15);border-radius:16px}
.moon-icon{font-size:2rem}
.ml{font-size:.9rem;font-weight:700;color:var(--accent2)}
.ms{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:.25rem}
.footer{margin-top:3rem;font-family:'Space Mono',monospace;font-size:.58rem;color:rgba(122,154,181,.35);text-align:center;letter-spacing:.08em}
.view{display:none}.view.active{display:block}
.loading{text-align:center;padding:4rem 0;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.error{text-align:center;padding:2rem;font-family:'Space Mono',monospace;font-size:.75rem;color:#f48fb1;background:rgba(244,143,177,.07);border:1px solid rgba(244,143,177,.2);border-radius:12px;margin-top:1rem}
</style>
</head>
<body>
<div id="stars"></div>
<canvas id="rc"></canvas>
<div class="page">
  <div class="city">Bremerhaven</div>
  <div class="date" id="dateline">—</div>

  <div id="main-content">
    <div class="loading" id="loader">Wetterdaten werden geladen…</div>
  </div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────
const se = document.getElementById('stars');
for (let i = 0; i < 110; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const z = Math.random() * 2 + .5;
  s.style.cssText = `width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s;--mo:${.3+Math.random()*.7}`;
  se.appendChild(s);
}

// ── Date ──────────────────────────────────────────────
const NOW = new Date();
const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DAYS_SHORT = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
document.getElementById('dateline').textContent =
  `${DAYS[NOW.getDay()]}, ${NOW.getDate()}. ${MONTHS[NOW.getMonth()]} ${NOW.getFullYear()}`;

// ── WMO weather code → icon + label ───────────────────
function wmoInfo(code) {
  if (code === 0)           return { icon: '☀️',  label: 'Klar' };
  if (code <= 2)            return { icon: '⛅',  label: 'Teilweise bewölkt' };
  if (code === 3)           return { icon: '☁️',  label: 'Bedeckt' };
  if (code <= 49)           return { icon: '🌫️', label: 'Nebel' };
  if (code <= 55)           return { icon: '🌦',  label: 'Nieselregen' };
  if (code <= 65)           return { icon: '🌧',  label: 'Regen' };
  if (code <= 75)           return { icon: '❄️',  label: 'Schneefall' };
  if (code <= 82)           return { icon: '🌧',  label: 'Regenschauer' };
  if (code <= 86)           return { icon: '🌨',  label: 'Schneeschauer' };
  if (code <= 99)           return { icon: '⛈️', label: 'Gewitter' };
  return { icon: '🌡️', label: 'Unbekannt' };
}

// ── Rain canvas ───────────────────────────────────────
const cv = document.getElementById('rc');
const cx = cv.getContext('2d');
function rs() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
rs(); window.addEventListener('resize', rs);
const drops = Array.from({ length: 160 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  l: Math.random() * 18 + 8,
  s: Math.random() * 3 + 1.5,
  o: Math.random() * .4 + .1
}));
let rainActive = false;
(function rain() {
  cx.clearRect(0, 0, cv.width, cv.height);
  if (rainActive) {
    drops.forEach(d => {
      cx.beginPath(); cx.moveTo(d.x, d.y); cx.lineTo(d.x - d.l * .2, d.y + d.l);
      cx.strokeStyle = `rgba(79,195,247,${d.o})`; cx.lineWidth = .7; cx.stroke();
      d.y += d.s * 2; d.x -= d.s * .4;
      if (d.y > cv.height) { d.y = -20; d.x = Math.random() * cv.width; }
    });
  }
  requestAnimationFrame(rain);
})();

// ── Tab switching ─────────────────────────────────────
function sv(v, btn) {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  document.getElementById('v-' + v).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

// ── Fetch & render ────────────────────────────────────
async function loadWeather() {
  const URL = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=53.55&longitude=8.58'
    + '&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,winddirection_10m,relativehumidity_2m,surface_pressure,visibility'
    + '&hourly=temperature_2m,weathercode'
    + '&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,uv_index_max,sunrise,sunset'
    + '&timezone=Europe%2FBerlin'
    + '&forecast_days=8';

  try {
    const res = await fetch(URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    renderWeather(d);
  } catch (e) {
    document.getElementById('loader').outerHTML =
      `<div class="error">⚠️ Wetterdaten konnten nicht geladen werden.<br>${e.message}</div>`;
  }
}

function windDir(deg) {
  const dirs = ['N','NO','O','SO','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function renderWeather(d) {
  const c = d.current;
  const daily = d.daily;
  const hourly = d.hourly;
  const info = wmoInfo(c.weathercode);

  // show rain if rainy code
  const rainy = [51,53,55,61,63,65,80,81,82].includes(c.weathercode);
  if (rainy) { rainActive = true; cv.classList.add('show'); }

  // find current hour index
  const curHour = NOW.getHours();
  const todayPrefix = NOW.toISOString().slice(0, 10);
  const hStart = hourly.time.findIndex(t => t.startsWith(todayPrefix) && parseInt(t.slice(11, 13)) === curHour);

  // sunrise/sunset today
  const sunrise = daily.sunrise[0] ? daily.sunrise[0].slice(11, 16) : '--';
  const sunset  = daily.sunset[0]  ? daily.sunset[0].slice(11, 16)  : '--';

  const html = `
  <div class="hero">
    <div class="temp-big">${Math.round(c.temperature_2m)}</div>
    <div class="temp-unit">°C</div>
    <div>
      <div class="cond">${info.icon} ${info.label}</div>
      <div class="sub">Gefühlt ${Math.round(c.apparent_temperature)}°C</div>
      <div class="sub">Wind ${Math.round(c.windspeed_10m)} km/h ${windDir(c.winddirection_10m)}</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sv('heute',this)">Heute</button>
    <button class="tab" onclick="sv('woche',this)">7 Tage</button>
    <button class="tab" onclick="sv('details',this)">Details</button>
  </div>

  <div class="view active" id="v-heute">
    <div class="stats">
      <div class="card"><div class="card-label">Luftfeuchtigkeit</div><div class="card-value">${c.relativehumidity_2m}%</div><div class="card-sub">${c.relativehumidity_2m > 80 ? 'sehr hoch' : c.relativehumidity_2m > 60 ? 'hoch' : 'normal'}</div></div>
      <div class="card"><div class="card-label">UV-Index</div><div class="card-value">${daily.uv_index_max[0]}</div><div class="card-sub">${daily.uv_index_max[0] <= 2 ? 'sehr niedrig' : daily.uv_index_max[0] <= 5 ? 'mittel' : 'hoch'}</div></div>
      <div class="card"><div class="card-label">Luftdruck</div><div class="card-value">${Math.round(c.surface_pressure)}</div><div class="card-sub">hPa</div></div>
      <div class="card"><div class="card-label">Niederschlag</div><div class="card-value">${daily.precipitation_sum[0]} mm</div><div class="card-sub">heute gesamt</div></div>
    </div>
    <div class="section-label">Stündlich</div>
    <div class="hourly" id="hourly"></div>
    <div class="moon-bar">
      <div class="moon-icon">🌅</div>
      <div>
        <div class="ml">Sonnenauf- & untergang</div>
        <div class="ms">Aufgang ${sunrise} · Untergang ${sunset}</div>
      </div>
    </div>
  </div>

  <div class="view" id="v-woche">
    <div class="section-label">7-Tage-Vorhersage</div>
    <div class="forecast" id="forecast"></div>
  </div>

  <div class="view" id="v-details">
    <div class="stats">
      <div class="card"><div class="card-label">Gefühlt</div><div class="card-value">${Math.round(c.apparent_temperature)}°C</div><div class="card-sub">aktuell</div></div>
      <div class="card"><div class="card-label">Windrichtung</div><div class="card-value">${windDir(c.winddirection_10m)}</div><div class="card-sub">${Math.round(c.winddirection_10m)}°</div></div>
      <div class="card"><div class="card-label">Max. heute</div><div class="card-value">${Math.round(daily.temperature_2m_max[0])}°C</div><div class="card-sub">Tageshoch</div></div>
      <div class="card"><div class="card-label">Min. heute</div><div class="card-value">${Math.round(daily.temperature_2m_min[0])}°C</div><div class="card-sub">Tagestief</div></div>
      <div class="card"><div class="card-label">Sonnenaufgang</div><div class="card-value">${sunrise}</div><div class="card-sub">Uhr</div></div>
      <div class="card"><div class="card-label">Sonnenuntergang</div><div class="card-value">${sunset}</div><div class="card-sub">Uhr</div></div>
    </div>
  </div>

  <div class="footer">Open-Meteo API · Echtzeit-Wetterdaten · Bremerhaven 53.55°N 8.58°O</div>
  `;

  document.getElementById('main-content').innerHTML = html;

  // Hourly strip (next 12h)
  const hs = document.getElementById('hourly');
  for (let i = 0; i < 12; i++) {
    const idx = hStart + i;
    if (idx >= hourly.time.length) break;
    const hr = parseInt(hourly.time[idx].slice(11, 13));
    const wi = wmoInfo(hourly.weathercode[idx]);
    const div = document.createElement('div');
    div.className = 'hour' + (i === 0 ? ' now' : '');
    div.innerHTML = `<div class="hour-time">${String(hr).padStart(2,'0')}:00</div><div class="hour-icon">${wi.icon}</div><div class="hour-temp">${Math.round(hourly.temperature_2m[idx])}°</div>`;
    hs.appendChild(div);
  }

  // 7-day forecast (skip today = index 0)
  const fl = document.getElementById('forecast');
  const maxT = Math.max(...daily.temperature_2m_max.slice(1, 8));
  const minT = Math.min(...daily.temperature_2m_min.slice(1, 8));
  for (let i = 1; i <= 7; i++) {
    const date = new Date(daily.time[i] + 'T12:00:00');
    const wi = wmoInfo(daily.weathercode[i]);
    const hi = Math.round(daily.temperature_2m_max[i]);
    const lo = Math.round(daily.temperature_2m_min[i]);
    const pct = Math.round(((hi - minT) / (maxT - minT || 1)) * 100);
    const row = document.createElement('div');
    row.className = 'frow';
    row.innerHTML = `<div class="fday">${DAYS_SHORT[date.getDay()]}</div><div class="ficon">${wi.icon}</div><div class="fbar"><div class="fbar-fill" style="width:${pct}%"></div></div><div class="ftemps">${hi}°<span class="flo">${lo}°</span></div>`;
    fl.appendChild(row);
  }
}

loadWeather();
</script>
</body>
</html>
